name: CI Diagnostic

on:
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Capture TypeScript output
        run: npx tsc --noEmit > tsc.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: tsc-log
          path: tsc.log
