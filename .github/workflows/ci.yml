name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: cantina-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Static, unit, and production validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Capture high-severity dependency audit
        id: audit
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high --json > npm-audit.json
          exit_code=$?
          echo "exit_code=${exit_code}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload dependency audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cantina-npm-audit
          path: npm-audit.json
          if-no-files-found: error
          retention-days: 14

      - name: Enforce dependency audit
        if: steps.audit.outputs.exit_code != '0'
        run: exit 1

      - name: Lint
        run: npm run lint

      - name: Unit and workflow tests
        run: npm test

      - name: Domain coverage
        run: npm run test:coverage

      - name: TypeScript validation
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Upload domain coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cantina-domain-coverage
          path: coverage
          if-no-files-found: warn
          retention-days: 14

  browser:
    name: Critical procurement browser flow
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build production application
        run: npm run build

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright against production server
        run: npm run test:e2e

      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cantina-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 14
