name: Clean complete clearing branch

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Remove publishing scaffolding and generated output
        run: |
          git fetch origin main
          git checkout origin/main -- src/generated/prisma
          rm -f .github/cc-patch-*
          rm -f .github/workflows/apply-complete-clearing.yml
          find docs src -name '*.orig' -delete
          git config user.name "Cantina Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "chore: clean complete clearing branch artifacts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
