name: Apply complete clearing feature

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply feature patch
        run: |
          cat .github/cc-patch-* > /tmp/complete-clearing.patch
          set +e
          patch --batch --forward --fuzz=3 -p1 < /tmp/complete-clearing.patch > /tmp/patch.log 2>&1
          echo $? > /tmp/patch-status
          set -e
          cat /tmp/patch.log
      - uses: actions/upload-artifact@v4
        with:
          name: complete-clearing-patch-log
          path: |
            /tmp/patch.log
            /tmp/patch-status
      - name: Require clean patch
        run: test "$(cat /tmp/patch-status)" = "0"
      - run: npm install
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Commit verified feature
        run: |
          git config user.name "Cantina Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md docs prisma src
          git commit -m "feat: complete clearing and settlement outcomes"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
