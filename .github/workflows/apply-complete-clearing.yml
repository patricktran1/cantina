name: Apply complete clearing feature

on:
  push:
    branches: [agent/complete-clearing]

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/complete-clearing
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply feature patch
        run: |
          cat .github/cc-patch-* > /tmp/complete-clearing.patch
          git apply --check /tmp/complete-clearing.patch
          git apply /tmp/complete-clearing.patch
      - run: npm install
      - run: npm audit --audit-level=high
      - run: npm run lint
      - run: npm test
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Commit verified feature
        run: |
          git config user.name "Cantina Build Bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md docs prisma src
          git commit -m "feat: complete clearing and settlement outcomes"
          git push origin HEAD:agent/complete-clearing
